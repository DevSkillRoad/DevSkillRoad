<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <style>
      .bg { fill: none; }
      .ring-outer { fill: none; stroke: #530899; stroke-width: 2.5; }
      .ring-inner { fill: none; stroke: #530899; stroke-width: 1.2; opacity: 0.4; }
      .arrow { fill: #530899; }
      .center { fill: #530899; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="128" height="128" rx="0"/>

  <!-- Кольца -->
  <circle class="ring-outer" cx="64" cy="64" r="56"/>
  <circle class="ring-inner" cx="64" cy="64" r="44"/>

  <!-- 4 грани -->
  <polygon class="arrow" points="64,10 74,50 64,58 54,50"/>
  <polygon class="arrow" points="64,118 74,78 64,70 54,78"/>
  <polygon class="arrow" points="118,64 78,74 70,64 78,54"/>
  <polygon class="arrow" points="10,64 50,74 58,64 50,54"/>

  <!-- Центр -->
  <circle class="center" cx="64" cy="64" r="7"/>
</svg>